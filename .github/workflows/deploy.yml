name: Deploy to xenia.rabbarien.de

on:
  push:
    branches: [master, main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Frontend bauen
        run: npm run build
        env:
          VITE_API_BASE: https://xenia.rabbarien.de/api

      - name: sshpass installieren
        run: sudo apt-get install -y sshpass

      - name: Auf Server hochladen
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" scp \
            -o StrictHostKeyChecking=no \
            -r dist/. \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/xenia/

      - name: API-PHP-Dateien hochladen (ohne config.local.php)
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" scp \
            -o StrictHostKeyChecking=no \
            $(find api/ -name "*.php" ! -name "config.local.php" | tr '\n' ' ') \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/xenia/api/
